name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit changes and create release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Needed to compare with previous commit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get changed files
        id: changed_files
        run: |
          echo "CHANGED=$(git diff --name-only HEAD^ HEAD | tr '\n' ' ')" >> $GITHUB_OUTPUT
          echo "COUNT=$(git diff --name-only HEAD^ HEAD | wc -l)" >> $GITHUB_OUTPUT

      - name: Determine version
        id: version
        run: |
          VERSION_FILE="manifest.json"

          if [ -f "$VERSION_FILE" ]; then
            VERSION=$(jq -r '.version' "$VERSION_FILE")
          else
            VERSION="1.00.000"
          fi

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          COUNT="${{ steps.changed_files.outputs.COUNT }}"

          if [ "$COUNT" -ge 3 ]; then
            MAJOR=$((10#$MAJOR + 1))
            MINOR=00
            PATCH=000
          elif [ "$COUNT" -eq 2 ]; then
            MINOR=$((10#$MINOR + 1))
            PATCH=000
          elif [ "$COUNT" -eq 1 ]; then
            PATCH=$((10#$PATCH + 1))
          fi

          NEW_VERSION=$(printf "%d.%02d.%03d" "$MAJOR" "$MINOR" "$PATCH")

          echo "new version: $NEW_VERSION"
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "{ \"version\": \"$VERSION\" }" > manifest.json

      - name: Commit and push updated manifest.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add manifest.json
          git commit -m "chore: update manifest version to ${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push origin main

      - name: Create zip artifact
        run: |
          ZIP_NAME="release-${{ steps.version.outputs.VERSION }}.zip"
          zip -r "$ZIP_NAME" . -x ".git/*" ".github/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.VERSION }}"
          name: "Release ${{ steps.version.outputs.VERSION }}"
          body: |
            ### Changelog
            Files changed in this release:

            ${{ steps.changed_files.outputs.CHANGED }}
          files: release-${{ steps.version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
